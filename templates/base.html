<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Prospection B2B{% endblock %} · ProspectB2B</title>
  <meta name="description" content="Trouvez le bon contact marketing ou ventes d'une entreprise et exportez-le en Excel.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <!-- Sans JavaScript, les sections à révélation restent visibles. -->
  <noscript><style>.reveal{opacity:1 !important;transform:none !important}</style></noscript>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="logo" href="/">
        <span class="logo-mark">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        </span>
        <span>Prospect<b>B2B</b></span>
      </a>
      <nav class="nav-liens">
        {% if utilisateur %}
          <a href="/app">Outil</a>
          <a href="/abonnement">Mon compte</a>
          {% if utilisateur.admin %}<a href="/admin">Admin</a>{% endif %}
          <a class="btn-ghost" href="/logout">Déconnexion</a>
        {% else %}
          <a href="/login">Se connecter</a>
          <a class="btn" href="/inscription">Créer un compte</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <a class="logo" href="/">
        <span class="logo-mark">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        </span>
        <span>Prospect<b>B2B</b></span>
      </a>
      <nav class="footer-liens">
        <span>© 2026 ProspectB2B</span>
        <a href="mailto:contact@prospectb2b.app">Contact</a>
        <a href="/confidentialite">Confidentialité</a>
      </nav>
    </div>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
