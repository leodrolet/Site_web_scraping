{% extends "base.html" %}
{% block title %}Créer un compte{% endblock %}

{% block content %}
<section class="bloc centre-page">
  <div class="carte carte-form">
    <div class="form-tete">
      <div class="chip-ic">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
      </div>
      <h1>Créer mon compte</h1>
      <p>Gratuit — vos clés API restent les vôtres.</p>
    </div>

    {% if erreur %}
      <div class="alerte alerte-error">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
        {{ erreur }}
      </div>
    {% endif %}

    <form method="post" action="/inscription">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="champ">
        <label for="nom">Nom <span class="muted">(optionnel)</span></label>
        <div class="input-wrap">
          <svg class="input-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="nom" name="nom" value="{{ nom or '' }}" placeholder="Votre nom">
        </div>
      </div>
      <div class="champ">
        <label for="email">Courriel</label>
        <div class="input-wrap">
          <svg class="input-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          <input type="email" id="email" name="email" value="{{ email or '' }}" required placeholder="vous@entreprise.com">
        </div>
      </div>
      <div class="champ">
        <label for="mot_de_passe">Mot de passe <span class="muted">(8 caractères min.)</span></label>
        <div class="input-wrap">
          <svg class="input-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="mot_de_passe" name="mot_de_passe" minlength="8" required placeholder="••••••••">
        </div>
      </div>
      <div class="champ">
        <label for="confirmation">Confirmer le mot de passe</label>
        <div class="input-wrap">
          <svg class="input-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="confirmation" name="confirmation" minlength="8" required placeholder="••••••••">
        </div>
      </div>
      <button class="btn btn-bloc" type="submit">Créer mon compte</button>
    </form>

    <p class="lien-bas">
      Déjà un compte ? <a href="/login">Se connecter</a>
    </p>
  </div>
</section>
{% endblock %}
